<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinav Estates</title><!-- SEO --><meta name="description" content="Abhinav Estates Mumbai - Buy, Sell, Rent Properties">
<meta name="keywords" content="real estate Mumbai, flats, rent, buy property"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#fff}

header{display:flex;justify-content:space-between;padding:15px;background:#0a1f44;color:#fff}
.logo{color:gold;font-weight:700}

.menu-toggle{font-size:25px;cursor:pointer;display:none}
nav{display:flex;gap:20px}
nav a{color:#fff;text-decoration:none}

@media(max-width:768px){
nav{display:none;flex-direction:column;position:absolute;top:60px;background:#0a1f44;width:100%}
nav.active{display:flex}
.menu-toggle{display:block}
}

.hero{padding:80px;text-align:center;background:#eee}

.preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{border:1px solid #ddd;padding:10px}

.btn{background:red;color:#fff;padding:10px;display:inline-block;margin-top:10px;text-decoration:none}

</style></head>
<body><header>
<div class="logo">Abhinav Estates</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="nav">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="properties.html">Properties</a>
<a href="contact.html">Contact</a>
</nav>
</header><section class="hero">
<h1>Luxury Living. Smart Investments.</h1>
<input id="search" placeholder="Search location">
<button onclick="goSearch()">Search</button>
</section><h2 style="text-align:center;margin-top:20px">Property Preview</h2>
<div class="preview" id="preview"></div><div style="text-align:center">
<a class="btn" href="properties.html">View All</a>
</div><script>

function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}

function goSearch(){
let val=document.getElementById("search").value;
window.location.href="properties.html?search="+val;
}

// SAMPLE DATA
let data=[];
for(let i=1;i<=6;i++){
data.push({title:"Property "+i,location:"Mumbai"});
}

let html="";
data.forEach(p=>{
html+=`<div class="card"><h4>${p.title}</h4><p>${p.location}</p></div>`;
});
document.getElementById("preview").innerHTML=html;

</script></body>
</html>

<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinav Estates</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#f5f7fb}

/* HEADER */
header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;
background:linear-gradient(90deg,#0a1f44,#1c3c78);
z-index:1000;color:#fff;
}
.logo{color:gold;font-size:22px;font-weight:700}
.menu-toggle{font-size:26px;cursor:pointer}

/* SIDE MENU */
nav{
position:fixed;top:0;right:-100%;
width:75%;height:100%;
background:#0a1f44;
padding:30px 20px;
transition:0.3s;
overflow-y:auto;
}
nav.active{right:0}

nav a{
color:#fff;text-decoration:none;
display:block;padding:10px 0;font-size:18px;
}

.submenu{display:none;padding-left:15px}
.submenu a{font-size:16px;color:#ccc}

/* HERO FIX (REMOVED GAP + IMAGE BG) */
.hero{
margin-top:60px;
height:90vh;
background:linear-gradient(rgba(10,31,68,0.7),rgba(10,31,68,0.7)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');
background-size:cover;
background-position:center;
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;color:#fff;padding:20px;
}

.hero h1{font-size:32px;line-height:1.4}
.hero p{color:gold;margin:10px 0}

.search-box{
display:flex;gap:10px;margin-top:15px
}
.search-box input{padding:12px;border:none;border-radius:5px;width:200px}
.search-box button{padding:12px;background:red;color:#fff;border:none;border-radius:5px}

/* SECTION */
.section-title{
text-align:center;margin:30px 0;font-size:24px;font-weight:700
}

/* PROPERTY CARDS WITH IMAGE */
.preview{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;padding:15px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;height:120px;object-fit:cover;
}

.card-body{padding:10px}
.card h4{font-size:15px}
.card p{color:#666;font-size:13px}

.btn{
display:block;width:85%;margin:20px auto;
background:linear-gradient(90deg,red,#ff4d4d);
color:#fff;padding:12px;border-radius:8px;text-align:center;text-decoration:none
}

</style></head>
<body><header>
<div class="logo">Abhinav Estates</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div><nav id="nav">
<a href="index.html">Home</a><a onclick="toggleSubmenu('projectMenu')">Projects ▼</a>

<div id="projectMenu" class="submenu"><a onclick="toggleSubmenu('commercialMenu')">Commercial ▼</a>

<div id="commercialMenu" class="submenu">
<a href="properties.html?type=commercial&mode=rent">Rent for Commercial</a>
<a href="properties.html?type=commercial&mode=sale">Sale for Commercial</a>
</div><a onclick="toggleSubmenu('residentialMenu')">Residential ▼</a>

<div id="residentialMenu" class="submenu">
<a href="properties.html?type=residential&mode=rent">Rent for Residential</a>
<a href="properties.html?type=residential&mode=sale">Sale for Residential</a>
</div></div><a href="services.html">Services</a> <a href="contact.html">Contact</a>

</nav>
</header><section class="hero">
<h1>Luxury Living. Smart Investments.</h1>
<p>Premium Real Estate in Mumbai</p><div class="search-box">
<input id="search" placeholder="Search location">
<button onclick="goSearch()">Search</button>
</div>
</section><h2 class="section-title">Property Preview</h2>
<div class="preview" id="preview"></div>
<a class="btn" href="properties.html">View All Properties</a><script>

function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}

function toggleSubmenu(id){
let el=document.getElementById(id);
el.style.display = el.style.display === "block" ? "none" : "block";
}

function goSearch(){
let val=document.getElementById("search").value;
window.location.href="properties.html?search="+val;
}

// PROPERTY WITH IMAGE
let data=[];
for(let i=1;i<=6;i++){
data.push({
title:"Luxury Property "+i,
location:"Mumbai",
image:"https://images.unsplash.com/photo-1560185127-6ed189bf02f4"
});
}

let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<div class="card-body">
<h4>${p.title}</h4>
<p>${p.location}</p>
</div>
</div>`;
});

document.getElementById("preview").innerHTML=html;

</script></body>
</html>
